<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEMENTE | Pacientes</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/pacientes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar" id="sidebar-component"></aside>

    <main class="main-content">
        <header class="top-bar">
            <button id="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></button>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="inputBusca" placeholder="Buscar por nome ou CPF...">
            </div>
            <button class="btn-primary" onclick="openModal('patientModal')">
                <i class="fas fa-user-plus"></i> <span class="hide-mobile">Novo Paciente</span>
            </button>
        </header>

        <section class="content-padding">
            <div class="page-header">
                <h2>Meus Pacientes</h2>
                <span class="badge-count">24 Total</span>
            </div>

            <div class="table-responsive">
                <table class="patient-table">
                    <thead>
                        <tr>
                            <th>Paciente</th>
                            <th>CPF</th>
                            <th class="hide-tablet">Última Sessão</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPacientes">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="patientModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-user-plus"></i> Novo Paciente</h3>
            <button class="close-btn" onclick="closeModal('patientModal')">&times;</button>
        </div>
        <form id="formNovoPaciente" class="modal-form">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Ana Clara Silva" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="form-group">
                    <label for="status">Status Inicial</label>
                    <select id="status" name="status" class="form-select">
                        <option value="Ativo">Ativo</option>
                        <option value="Inativo">Inativo</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" name="telefone" placeholder="(31) 90000-0000">
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeModal('patientModal')">Cancelar</button>
                <button type="submit" class="btn-primary">Salvar Paciente</button>
            </div>
        </form>
    </div>
</div>

    <!-- Modal de Confirmação de Exclusão -->
    <div id="deleteModal" class="modal">
        <div class="modal-content" style="max-width: 420px;">
            <div class="modal-header">
                <h3><i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i> Confirmar Exclusão</h3>
                <button class="close-btn" onclick="closeModal('deleteModal')">&times;</button>
            </div>
            <div class="modal-form">
                <p style="color:#1e293b; margin-bottom: 8px;">
                    Você tem certeza que deseja excluir o paciente:
                </p>
                <p id="deleteNomePaciente" style="font-weight: 700; color: #db2777; font-size: 1.05rem; margin-bottom: 20px;"></p>
                <p style="font-size: 0.85rem; color: #64748b;">
                    <i class="fas fa-info-circle"></i>
                    Esta ação é irreversível. Todas as evoluções vinculadas também serão removidas.
                </p>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="closeModal('deleteModal')">Cancelar</button>
                    <button id="btnConfirmarDelete" class="btn-danger">Excluir Paciente</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/components.js"></script>
    <script src="../js/pacientes.js"></script>
</body>
</html>

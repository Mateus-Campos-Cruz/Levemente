<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEMENTE | Autenticação</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <main class="auth-container">
        <header class="auth-header">
            <h1>LEVEMENTE</h1>
            <p>Sua prática clínica, mais leve.</p>
        </header>

        <section class="auth-card">
            <div class="tabs">
                <button class="tab-btn active" id="tab-login" onclick="toggleAuth('login')">Entrar</button>
                <button class="tab-btn" id="tab-register" onclick="toggleAuth('register')">Cadastrar</button>
            </div>

            <!-- Formulário de Login -->
            <form id="login-form" class="auth-form">
                <div class="input-group">
                    <label for="email">E-mail Profissional</label>
                    <div class="input-field">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="exemplo@email.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Acessar Plataforma</button>
                <a href="#" class="forgot-password">Esqueceu sua senha?</a>
            </form>

            <!-- Formulário de Cadastro -->
            <form id="register-form" class="auth-form hidden">
                <div class="input-group">
                    <label for="reg-nome">Nome Completo</label>
                    <div class="input-field">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-nome" placeholder="Seu nome completo" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-email">E-mail Profissional</label>
                    <div class="input-field">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-crp">Registro Profissional (CRP/CRM)</label>
                    <div class="input-field">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="reg-crp" placeholder="00/00000" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-password">Senha</label>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                </div>

                <div class="lgpd-consent">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        Li e aceito a <a href="#">Política de Privacidade</a>.
                    </label>
                </div>

                <button type="submit" class="btn-submit">Criar Minha Conta</button>
            </form>
        </section>
    </main>

    <script src="../js/auth.js"></script>
</body>
</html>

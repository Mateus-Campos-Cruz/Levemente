<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEMENTE | Agenda</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/agenda.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar" id="sidebar-component"></aside>

    <main class="main-content">
        <header class="top-bar">
            <button id="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></button>
            <div class="calendar-controls">
                <div class="nav-group">
                    <button id="prevMonth" class="btn-nav" title="Mês Anterior"><i class="fas fa-chevron-left"></i></button>
                    <div class="select-group">
                        <select id="selectMonth" class="select-clean">
                            <option value="0">Janeiro</option>
                            <option value="1">Fevereiro</option>
                            <option value="2">Março</option>
                            <option value="3">Abril</option>
                            <option value="4">Maio</option>
                            <option value="5">Junho</option>
                            <option value="6">Julho</option>
                            <option value="7">Agosto</option>
                            <option value="8">Setembro</option>
                            <option value="9">Outubro</option>
                            <option value="10">Novembro</option>
                            <option value="11">Dezembro</option>
                        </select>
                        <select id="selectYear" class="select-clean">
                            <!-- Populado via JS -->
                        </select>
                    </div>
                    <button id="nextMonth" class="btn-nav" title="Próximo Mês"><i class="fas fa-chevron-right"></i></button>
                </div>
                <h2 id="current-month-display">Abril 2026</h2>
            </div>
            <button class="btn-new-event" onclick="abrirNovoAgendamento()">
                <i class="fas fa-plus"></i> <span>Nova Sessão</span>
            </button>
        </header>

        <section class="content-padding">
            <div class="calendar-container">
                <div class="calendar-weekdays">
                    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                </div>
                
                <div class="calendar-grid">
                    <div class="day day-off">29</div><div class="day day-off">30</div><div class="day day-off">31</div>
                    
                    <div class="day">1</div><div class="day">2</div><div class="day">3</div>
                    <div class="day">4 <span class="event-dot"></span></div>
                    <div class="day today">5 <span class="event-dot"></span></div>
                    <div class="day">6</div>
                    <div class="day has-events">
                        7
                        <div class="event-badge confirmed">09:00 - Ana</div>
                        <div class="event-badge pending">14:00 - João</div>
                    </div>
                    <div class="day">8</div><div class="day">9</div><div class="day">10</div>
                </div>
            </div>

            <div class="day-details-card card" id="day-details-container">
                <!-- Populado dinamicamente via JS -->
                <p class="no-events">Carregando sessões...</p>
            </div>
        </section>
    </main>
    <!-- Modal de Nova Sessão -->
    <div id="eventModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <i class="fas fa-calendar-plus"></i>
                <h3>Novo Agendamento</h3>
            </div>
            <form id="formNovaSessao" class="modal-form">
                <input type="hidden" id="id_agenda_edit">
                <div class="form-group">
                    <label for="paciente_search">Paciente *</label>
                    <div class="custom-select-container">
                        <input type="text" id="paciente_search" placeholder="Digite para buscar paciente..." autocomplete="off" required>
                        <input type="hidden" id="paciente_id">
                        <div id="paciente_results" class="search-results"></div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="data_sessao">Data</label>
                        <input type="date" id="data_sessao" name="data_sessao" required>
                    </div>
                    <div class="form-group">
                        <label for="hora_sessao">Hora</label>
                        <input type="time" id="hora_sessao" name="hora_sessao" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="link_sessao">Link da Sessão (Opcional)</label>
                    <input type="url" id="link_sessao" name="link_sessao" placeholder="https://meet.google.com/...">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('eventModal')">Cancelar</button>
                    <button type="submit" class="btn-primary" id="btnConfirmarSessao">Confirmar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/components.js"></script>
    <script src="../js/agenda.js"></script>
</body>
</html>

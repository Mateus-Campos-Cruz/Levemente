<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEMENTE | Agenda</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/agenda.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar" id="sidebar-component"></aside>

    <main class="main-content">
        <header class="top-bar">
            <button id="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></button>
            <div class="calendar-controls">
                <button class="btn-nav"><i class="fas fa-chevron-left"></i></button>
                <h2 id="current-month">Abril 2026</h2>
                <button class="btn-nav"><i class="fas fa-chevron-right"></i></button>
            </div>
            <button class="btn-new-event" onclick="openModal('eventModal')">
                <i class="fas fa-plus"></i> <span>Nova Sessão</span>
            </button>
        </header>

        <section class="content-padding">
            <div class="calendar-container">
                <div class="calendar-weekdays">
                    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                </div>
                
                <div class="calendar-grid">
                    <div class="day day-off">29</div><div class="day day-off">30</div><div class="day day-off">31</div>
                    
                    <div class="day">1</div><div class="day">2</div><div class="day">3</div>
                    <div class="day">4 <span class="event-dot"></span></div>
                    <div class="day today">5 <span class="event-dot"></span></div>
                    <div class="day">6</div>
                    <div class="day has-events">
                        7
                        <div class="event-badge confirmed">09:00 - Ana</div>
                        <div class="event-badge pending">14:00 - João</div>
                    </div>
                    <div class="day">8</div><div class="day">9</div><div class="day">10</div>
                </div>
            </div>

            <div class="day-details-card card">
                <h3>Sessões em 07 de Abril</h3>
                <div class="event-item">
                    <span class="status-indicator confirmed"></span>
                    <div class="info">
                        <strong>Ana Clara Silva</strong>
                        <span>09:00 - Psicoterapia Individual</span>
                    </div>
                    <div class="actions">
                        <button title="Remarcar"><i class="fas fa-sync-alt"></i></button>
                        <button title="Falta" class="btn-danger"><i class="fas fa-user-times"></i></button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="eventModal" class="modal">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h3><i class="fas fa-calendar-plus"></i> Novo Agendamento</h3>
                <button class="close-btn" onclick="closeModal('eventModal')">&times;</button>
            </div>
            <form id="formNovaSessao" class="modal-form">
                <div class="form-group">
                    <label for="paciente_id">Paciente</label>
                    <select id="paciente_id" name="paciente_id" required>
                        <option value="">Selecione o paciente...</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="data_sessao">Data</label>
                        <input type="date" id="data_sessao" name="data_sessao" required>
                    </div>
                    <div class="form-group">
                        <label for="hora_sessao">Hora</label>
                        <input type="time" id="hora_sessao" name="hora_sessao" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('eventModal')">Cancelar</button>
                    <button type="submit" class="btn-primary">Confirmar Agendamento</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/components.js"></script>
    <script src="../js/agenda.js"></script>
</body>
</html>

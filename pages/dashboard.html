<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEMENTE | Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

   <aside class="sidebar" id="sidebar-component"></aside>

    <main class="main-content">
        <header class="top-bar">
            <button id="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></button>
            <div class="user-info">
                <span>Olá, <strong id="user-name-display">Mateus</strong></span>
                <div class="avatar" id="user-avatar-display">M</div>
            </div>
        </header>

        <section class="content-padding">
            <div class="metrics-grid">
                <div class="metric-card">
                    <i class="fas fa-user-check"></i>
                    <div class="metric-info">
                        <h3>Pacientes Ativos</h3>
                        <p id="total-pacientes-ativos">0</p>
                    </div>
                </div>
                <div class="metric-card">
                    <i class="fas fa-calendar-day"></i>
                    <div class="metric-info">
                        <h3>Sessões Hoje</h3>
                        <p id="total-sessoes-hoje">0</p>
                    </div>
                </div>
                <div class="metric-card accent">
                    <i class="fas fa-hand-holding-usd"></i>
                    <div class="metric-info">
                        <h3>Faturamento Mês</h3>
                        <p id="faturamento-mes">R$ 0,00</p>
                    </div>
                </div>
            </div>

            <div class="dashboard-layout">
                <div class="card sessions-card">
                    <div class="card-header">
                        <h3>Sessões Pendentes (Hoje)</h3>
                        <a href="agenda.html" class="view-all">Ver Agenda</a>
                    </div>
                    <ul class="session-list" id="lista-sessoes-pendentes">
                        <li class="session-item" style="justify-content: center; color: #64748b; padding: 20px;">
                            Carregando sessões...
                        </li>
                    </ul>
                </div>

                <div class="card recent-patients">
                    <div class="card-header">
                        <h3>Evoluções Recentes</h3>
                    </div>
                    <div class="empty-state">
                        <p>Todas as evoluções de hoje estão em dia.</p>
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>
            </div>
        </section>
       
    </main>

 <script src="../js/components.js"></script>
 <script src="../js/dashboard.js"></script>
</body>
</html>

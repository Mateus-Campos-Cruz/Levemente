<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEMENTE | Financeiro</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/financeiro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar" id="sidebar-component"></aside>

    <main class="main-content">
        <header class="top-bar">
            <h2>Gestão Financeira</h2>
            <button class="btn-primary" onclick="openModal('modalLancamento')">
                <i class="fas fa-plus"></i> Novo Lançamento
            </button>
        </header>

        <section class="content-padding">
            <div class="stats-grid">
                <div class="stat-card income">
                    <span>Receita Mensal (Pago)</span>
                    <h3 id="receita-total">R$ 0,00</h3>
                    <i class="fas fa-arrow-up"></i>
                </div>
                <div class="stat-card pending">
                    <span>A Receber (Pendente)</span>
                    <h3 id="pendente-total">R$ 0,00</h3>
                    <i class="fas fa-clock"></i>
                </div>
            </div>

            <div class="card table-container">
                <table class="finance-table">
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th>Paciente</th>
                            <th>Valor</th>
                            <th>Vencimento</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaFinanceira">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modalLancamento" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-file-invoice-dollar"></i> Novo Lançamento</h3>
                <button class="close-btn" onclick="closeModal('modalLancamento')">&times;</button>
            </div>
            <form id="formFinanceiro" class="modal-form">
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" name="descricao" placeholder="Ex: Sessão Semanal" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" step="0.01" name="valor" required>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select name="status" class="form-select">
                            <option value="pago">Pago</option>
                            <option value="pendente">Pendente</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('modalLancamento')">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/components.js"></script>
    <script src="../js/financeiro.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEMENTE | Editar Paciente</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/pacientes.css"> <!-- Reusing form styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .edit-form-card {
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--pink-border);
        }
        .section-title {
            color: var(--pink-accent);
            font-size: 1.1rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--pink-light);
            padding-bottom: 10px;
            margin-top: 30px;
        }
        .section-title:first-child { margin-top: 0; }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background-color: #f8fafc;
            font-family: inherit;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--pink-light);
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar-component"></aside>

    <main class="main-content">
        <header class="top-bar">
            <button id="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></button>
            <div class="breadcrumb">
                <a href="pacientes.html">Pacientes</a> / <a href="#" id="link-voltar-perfil">Perfil</a> / <strong>Editar</strong>
            </div>
        </header>

        <section class="content-padding">
            <div class="page-header">
                <h2>Editar Prontuário</h2>
            </div>

            <div class="edit-form-card">
                <form id="formEditPaciente">
                    
                    <h3 class="section-title"><i class="fas fa-user"></i> Dados Pessoais</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nome_completo">Nome Completo *</label>
                            <input type="text" id="nome_completo" required>
                        </div>
                        <div class="form-group">
                            <label for="cpf">CPF *</label>
                            <input type="text" id="cpf" required>
                        </div>
                        <div class="form-group">
                            <label for="data_nascimento">Data de Nascimento</label>
                            <input type="date" id="data_nascimento">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="estado_civil">Estado Civil</label>
                            <select id="estado_civil">
                                <option value="">Selecionar...</option>
                                <option value="Solteiro(a)">Solteiro(a)</option>
                                <option value="Casado(a)">Casado(a)</option>
                                <option value="Divorciado(a)">Divorciado(a)</option>
                                <option value="Viúvo(a)">Viúvo(a)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="escolaridade">Escolaridade</label>
                            <input type="text" id="escolaridade" placeholder="Ex: Superior Completo">
                        </div>
                        <div class="form-group">
                            <label for="profissao">Profissão</label>
                            <input type="text" id="profissao" placeholder="Ex: Engenheiro">
                        </div>
                    </div>

                    <h3 class="section-title"><i class="fas fa-address-book"></i> Contato e Endereço</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="telefone">Telefone</label>
                            <input type="text" id="telefone">
                        </div>
                        <div class="form-group" style="flex: 2;">
                            <label for="endereco">Endereço Completo</label>
                            <input type="text" id="endereco" placeholder="Ex: Rua das Flores, 123 - Centro, BH/MG">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="contato_emergencia">Contato de Emergência</label>
                            <input type="text" id="contato_emergencia" placeholder="Ex: Maria (Mãe) - (31) 99999-9999">
                        </div>
                        <div class="form-group">
                            <label for="status">Status</label>
                            <select id="status">
                                <option value="Ativo">Ativo</option>
                                <option value="Inativo">Inativo</option>
                            </select>
                        </div>
                    </div>

                    <h3 class="section-title"><i class="fas fa-notes-medical"></i> Anamnese e Histórico</h3>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="queixa_principal">Queixa Principal</label>
                        <textarea id="queixa_principal" placeholder="Motivo da busca por terapia..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="historico_familiar">Histórico Familiar</label>
                            <textarea id="historico_familiar"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="medicacoes_em_uso">Medicações em Uso</label>
                            <textarea id="medicacoes_em_uso"></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="btnCancelar">Cancelar</button>
                        <button type="submit" class="btn-primary" id="btnSalvar">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="../js/components.js"></script>
    <script src="../js/perfil-paciente-edit.js"></script>
</body>
</html>

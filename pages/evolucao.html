<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEMENTE | Evolução do Paciente</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/pacientes.css">
    <link rel="stylesheet" href="/css/evolucao.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar" id="sidebar-component"></aside>

    <main class="main-content">
        <header class="top-bar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button id="menu-toggle" class="menu-btn"><i class="fas fa-bars"></i></button>
                <div class="breadcrumb" style="margin: 0;">
                    <a href="pacientes.html">Pacientes</a> / <a href="#" id="link-perfil-paciente">Carregando...</a> / <strong>Evolução</strong>
                </div>
            </div>
            <button class="btn-primary" id="btnNovaEvolucao">
                <i class="fas fa-plus"></i> Nova Evolução
            </button>
        </header>

        <section class="content-padding">
            <div id="lista-evolucoes" class="timeline">
                <!-- Evoluções serão inseridas aqui dinamicamente -->
            </div>
        </section>
    </main>

    <!-- Modal Confirmar Exclusão de Evolução -->
    <div id="deleteEvolucaoModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div class="modal-header" style="justify-content: center; border: none; padding-bottom: 0;">
                <div style="width: 60px; height: 60px; border-radius: 50%; background: #fee2e2; color: #ef4444; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto;">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
            </div>
            <div style="padding: 20px 0;">
                <h3 style="margin-bottom: 10px;">Excluir Evolução?</h3>
                <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px;">
                    Tem certeza que deseja excluir esta evolução? Esta ação não pode ser desfeita.
                </p>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="btn-secondary" onclick="closeModal('deleteEvolucaoModal')" style="flex: 1;">Cancelar</button>
                    <button class="btn-primary" id="btnConfirmarDeleteEvolucao" style="flex: 1; background: #ef4444; border-color: #ef4444;">Sim, Excluir</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/components.js"></script>
    <script src="../js/evolucao.js"></script>
</body>
</html>
